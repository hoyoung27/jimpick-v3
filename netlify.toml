# 짐픽 V2 AI 이사견적 - Netlify 배포 설정
# 이 파일을 index.html과 같은 폴더(최상위)에 두면 Netlify가 자동으로 인식합니다.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# index.html이 항상 우선적으로 서빙되도록 (SPA 방식 새로고침 대응)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
